<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bird in a Bucky Box — Mic Reactive</title>
    <style>
      :root {
        --bg: #020712;
        --fg: #d9fff4;
        --neon: #45ffd2;
        --accent: #8f79ff;
        --warn: #ff7ab8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--fg);
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at 30% 20%, #0f1b38 0%, #04060d 55%, #010205 100%);
      }
      #stage {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .hud {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 2;
        width: min(450px, calc(100vw - 2rem));
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 12px;
        background: rgba(6, 12, 26, 0.74);
        backdrop-filter: blur(8px);
      }
      h1 {
        margin: 0 0 0.45rem;
        font-size: clamp(1rem, 1.1rem + 0.9vw, 1.5rem);
      }
      p {
        margin: 0 0 0.75rem;
        opacity: 0.9;
        font-size: 0.95rem;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 9px;
        background: rgba(69, 255, 210, 0.12);
        color: var(--fg);
        padding: 0.45rem 0.75rem;
        cursor: pointer;
      }
      .meter {
        margin-top: 0.8rem;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      .bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--neon), var(--accent), var(--warn));
        box-shadow: 0 0 12px rgba(69, 255, 210, 0.8);
        transition: width 70ms linear;
      }
      #status { margin-top: 0.5rem; font-size: 0.88rem; opacity: 0.85; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <aside class="hud">
      <h1>Bird-in-a-Box Remix: 20-Sided "Bucky" Shell</h1>
      <p>Click enable mic, then make noise. The inner snake deforms instantly with ambient sound.</p>
      <button id="mic-toggle">Enable microphone</button>
      <div class="meter"><div id="meter-bar" class="bar"></div></div>
      <div id="status">Mic idle.</div>
    </aside>

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.162.0/build/three.module.js';

      const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('stage'), antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020712, 0.13);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0.2, 5.8);

      scene.add(new THREE.AmbientLight(0x446688, 0.35));
      const key = new THREE.PointLight(0x45ffd2, 2.2, 20);
      key.position.set(2.8, 3.6, 2.2);
      scene.add(key);
      const rim = new THREE.PointLight(0x8f79ff, 1.8, 16);
      rim.position.set(-2.9, -1.8, 2.3);
      scene.add(rim);

      const shellGeo = new THREE.IcosahedronGeometry(2.1, 0);
      const shell = new THREE.Mesh(
        shellGeo,
        new THREE.MeshPhysicalMaterial({
          color: 0x74fff0,
          transparent: true,
          opacity: 0.12,
          roughness: 0.2,
          metalness: 0.65,
          transmission: 0.65,
          thickness: 0.4
        })
      );
      scene.add(shell);

      const shellWire = new THREE.LineSegments(
        new THREE.WireframeGeometry(shellGeo),
        new THREE.LineBasicMaterial({ color: 0x83f6ff, transparent: true, opacity: 0.8 })
      );
      scene.add(shellWire);

      const pointCount = 150;
      const points = Array.from({ length: pointCount }, (_, i) => {
        const t = (i / (pointCount - 1)) * Math.PI * 3.8;
        const radius = 0.45 + i * 0.009;
        return new THREE.Vector3(
          Math.cos(t) * radius,
          (i / pointCount - 0.5) * 2.4,
          Math.sin(t) * radius
        );
      });

      const snakeCurve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.6);
      const snakeGeo = new THREE.TubeGeometry(snakeCurve, 340, 0.06, 12, false);
      const snakeMat = new THREE.MeshStandardMaterial({
        color: 0xff8fd0,
        emissive: 0x3b132d,
        metalness: 0.35,
        roughness: 0.22
      });
      let snake = new THREE.Mesh(snakeGeo, snakeMat);
      scene.add(snake);

      const starGeo = new THREE.BufferGeometry();
      const starCount = 950;
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i += 1) {
        starPos[i * 3] = (Math.random() - 0.5) * 14;
        starPos[i * 3 + 1] = (Math.random() - 0.5) * 10;
        starPos[i * 3 + 2] = (Math.random() - 0.5) * 12;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.025, color: 0x89baff }));
      scene.add(stars);

      const meterBar = document.getElementById('meter-bar');
      const statusEl = document.getElementById('status');
      const toggleBtn = document.getElementById('mic-toggle');
      let audioCtx;
      let analyser;
      let micData;
      let micLevel = 0;
      let stream;

      function rebuildSnake(level, t) {
        const amp = THREE.MathUtils.lerp(0.02, 0.56, Math.min(1, level * 2.4));
        for (let i = 0; i < points.length; i += 1) {
          const pct = i / (points.length - 1);
          const theta = pct * Math.PI * 14 + t * 0.0024;
          const curl = Math.sin(theta * 0.7 + t * 0.0011) * amp;
          const ring = 0.42 + pct * 1.25 + curl;
          points[i].x = Math.cos(theta) * ring;
          points[i].z = Math.sin(theta) * ring;
          points[i].y = -1.35 + pct * 2.7 + Math.sin(theta * 0.35 + t * 0.0016) * amp * 1.4;
        }

        snake.geometry.dispose();
        const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
        snake.geometry = new THREE.TubeGeometry(curve, 340, 0.05 + amp * 0.1, 12, false);
        snake.material.emissiveIntensity = 0.7 + Math.min(1.6, level * 3.2);
      }

      async function enableMic() {
        try {
          if (!navigator.mediaDevices?.getUserMedia) throw new Error('getUserMedia is unavailable in this browser');
          stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const src = audioCtx.createMediaStreamSource(stream);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          analyser.smoothingTimeConstant = 0.78;
          src.connect(analyser);
          micData = new Uint8Array(analyser.frequencyBinCount);
          statusEl.textContent = 'Microphone active: any ambient noise now drives the snake.';
          toggleBtn.textContent = 'Microphone enabled';
          toggleBtn.disabled = true;
        } catch (error) {
          statusEl.textContent = `Mic error: ${String(error.message || error)}`;
        }
      }

      toggleBtn.addEventListener('click', enableMic);

      function sampleMic() {
        if (!analyser || !micData) return 0;
        analyser.getByteFrequencyData(micData);
        let sum = 0;
        for (let i = 0; i < micData.length; i += 1) sum += micData[i];
        const avg = sum / micData.length;
        return Math.min(1, avg / 120);
      }

      function animate(time) {
        const live = sampleMic();
        micLevel = THREE.MathUtils.lerp(micLevel, live, 0.24);

        shell.rotation.x = time * 0.00012;
        shell.rotation.y = time * 0.00017;
        shellWire.rotation.copy(shell.rotation);
        stars.rotation.y += 0.00015;
        stars.rotation.x += 0.00003;

        const pulse = 1 + micLevel * 0.35;
        shell.scale.setScalar(pulse);
        shellWire.scale.setScalar(1 + micLevel * 0.25);
        key.intensity = 1.8 + micLevel * 2.7;

        rebuildSnake(micLevel, time);
        meterBar.style.width = `${(micLevel * 100).toFixed(1)}%`;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
